<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

body{
    font-family: Arial, Helvetica, sans-serif;
}

 a{
    color: red;
    text-decoration: none;
    font-weight: bold;
 }

 a:visited{
    color: darkred;

 }

a:hover{
color: black;
    text-decoration: underline;
}

a:active{
    color: blue;

}

.especial{
    background-color: rgb(224, 132, 132);
}

.especial::before{
    content: "→";
    color: darkgray;
}

.especial::after{
    content: "←";
    text-decoration: none;
    font-weight: normal;
    color: darkgray;
}

    </style>
</head>
<body>
    
<h1>Personalizando Links</h1>

<ul>
<li><a href="https://github.com/gustavoguimaraes">Repositorio GitHub</a></li>
<li><a href="https://www.youtube.com/@CursoemVideo"class='especial'>Canal do YouTube</a></li>
<li><a href="https://www.cursoemvideo.com" class="especial">Site CursoemVideo</a></li>


</ul>


</body>
</html>
